name: daily-update
on:
  schedule:
    - cron: '0 22 * * 1-5'   # 工作日 UTC 22:00 ≈ 美东收盘后 1~2 小时
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas requests lxml openpyxl
      - run: python scripts/build_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      - name: commit data
        run: |
          git config user.name "klaywang24"
          git config user.email "klaywang24@users.noreply.github.com"
          git add data
          git commit -m "data: daily update $(date -u +%F)" || echo "no changes"
          git pull --rebase origin main
          git push
