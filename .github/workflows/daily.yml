name: daily-update
on:
  schedule:
    - cron: '0 22 * * 1-5'   # 工作日 UTC 22:00 ≈ 美东收盘后 1~2 小时
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ⚠️ fetch-depth: 0 不可删——checkout 默认浅克隆(depth=1)，
      # 那样 verify_ledger 只能看见 1 个 commit，对不出任何历史改写，
      # 却会若无其事地报「总分歧=2」。2026-07-18 首次接线当场踩到：
      # 检查器不是不跑，是瞎着跑还给出一个看起来很干净的数字。
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas requests lxml openpyxl
      - run: python scripts/build_data.py
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # 台账自核：把 data/README「修订政策」从一句断言变成每日机器核验。
      # 必须在 commit 之前跑——此刻 git 历史里还是「昨天之前发布过的值」，
      # 拿它跟刚重算出来的文件对，才能看出本次重算有没有改写已发布的历史。
      # 产物 data/ledger_audit.json 随下一步 git add data 一起提交、公开可查。
      - name: verify ledger
        id: verify
        run: python scripts/verify_ledger.py
      # 哈希链：让「这份数据确实是那天记的」十年后仍能被外人验证。
      # 必须在 commit 之前跑——此刻 data/ 已是当日终稿，哈希算的就是随后被提交的那份字节。
      # 🔑 链（而非独立每日哈希）的全部理由：独立哈希挡不住「事后偷偷删掉难看的那几天」，
      #    剩下的照样验证通过；链把每天绑在前一天上，删任何一天其后 chain 全部对不上。
      - name: anchor hashes
        run: python scripts/anchor_hashes.py
      - name: commit data
        run: |
          git config user.name "klaywang24"
          git config user.email "klaywang24@users.noreply.github.com"
          git add data
          git commit -m "data: daily update $(date -u +%F)" || echo "no changes"
          git pull --rebase origin main
          git push
      # 锚定：把「公开可查」做成机制——git 日期本地可伪造，第三方存档不能。
      # 存当日 commit 的 GitHub 页（见证提交历史状态）+ 站点 + 两个台账 JSON。
      # Wayback 不稳定属常态：任何失败都不许影响管线与告警（continue-on-error + 逐条 || true）。
      - name: anchor to Wayback
        continue-on-error: true
        run: |
          SHA=$(git rev-parse HEAD)
          # 🔴 锚定是整条证据链的效力来源，而本步是 continue-on-error（故意的：Wayback
          #    抽风不该阻塞管线）。但那意味着**锚丢了不会有人知道**——十年后无法回答
          #    「哪些天有锚、哪些天没有」。故逐条记结果，下一次 commit 会把它带上。
          OK=0; FAIL=0; LOG="data/anchor_log.jsonl"
          for u in \
            "https://github.com/${{ github.repository }}/commit/$SHA" \
            "https://chronicle.klay-wang.com/" \
            "https://chronicle.klay-wang.com/data/kindex.json" \
            "https://chronicle.klay-wang.com/data/leaps_gauge.json" \
            "https://chronicle.klay-wang.com/data/ledger_hashes.jsonl"; do
            if curl -sS -m 60 "https://web.archive.org/save/$u" -o /dev/null; then
              OK=$((OK+1))
            else
              FAIL=$((FAIL+1)); echo "  ⚠️ 锚定失败: $u"
            fi
            sleep 5
          done
          printf '{"date":"%s","sha":"%s","ok":%d,"fail":%d}\n' \
            "$(date -u +%F)" "$SHA" "$OK" "$FAIL" >> "$LOG"
          echo "锚定结果：成功 $OK / 失败 $FAIL（已记入 $LOG，随下次 commit 提交）"
          # 全部失败 = 当天完全没有独立见证，值得知道
          [ "$OK" -eq 0 ] && echo "::warning::当日 Wayback 锚定全部失败，该日无独立见证" || true
      # ⚠️ if: always() 是故意的——失败时也要发通知。但必须把 job 状态传进去，
      # 否则脚本会读到磁盘上的旧 pulse.json，发出一条「看起来一切正常」的播报，
      # 把失败静默掉。2026-07-12→14 管线死了 4 天没人发现，就是栽在这里。
      - name: notify Discord
        if: always()
        run: python scripts/notify_discord.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # 空值（verify 步骤没跑成）→ 脚本不会谎报「台账无异常」，只是不发这条告警；
          # 真出事时 JOB_STATUS 那道闸会先响。
          LEDGER_DELTA: ${{ steps.verify.outputs.delta }}
          LEDGER_RELIABLE: ${{ steps.verify.outputs.reliable }}
