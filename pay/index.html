<title>Market Chronicle · 支付</title>
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center;
         background: #F6F5F1; color: #1a1a1a;
         font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; }
  main { text-align: center; padding: 24px; }
  a { color: inherit; }
  @media (prefers-color-scheme: dark) { body { background: #12131a; color: #e8e8ea; } }
</style>

<body>
<main>
  <p>正在打开支付页…</p>
  <p><small>没有自动打开？<a href="https://chronicle.klay-wang.com/#pricing">返回定价页</a></small></p>
</main>

<!-- Paddle 的 default payment link 落地页。
     Paddle 把客户送到这里时 URL 形如 /pay?_ptxn=txn_xxx，
     paddle.js 会自动检测该 query param 并弹出 overlay checkout。
     ⚠️ 本页绝不可调用 Paddle.Checkout.open()：官方原文
     "If your page calls Paddle.Checkout.open() on load ... this takes priority over the query parameter"，
     会把 _ptxn 顶掉，导致订阅客户改支付方式/补付款全部失效。
     ⚠️ 也不要传 displayMode：默认即 overlay；设成 inline 而无容器 div 会渲染不出来。 -->
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<script>
  if (window.Paddle) Paddle.Initialize({ token: "live_9a38df12cfaaa8645cc6c4ee404" });
</script>
</body>
</html>
